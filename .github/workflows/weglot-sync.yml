name: Weglot Exclusion Sync

on:
  schedule:
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-exclusions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Weglot Exclusions
        id: sync
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEGLOT_API_KEY: ${{ secrets.WEGLOT_API_KEY }}
        run: python3 tools/weglot/sync_exclusions.py

      - name: Regenerate Sitemap
        if: steps.sync.outputs.changes_made == 'true'
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python3 tools/generate_master_sitemap.py

      - name: Commit & Push
        if: steps.sync.outputs.changes_made == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/weglot-exclusions.json data/weglot-sitemap-exclusions.json sitemap.xml
          # Sync CSV: copy to root if exists, delete root if data CSV was cleared
          if [ -f data/weglot.csv ]; then
            cp data/weglot.csv weglot.csv
          else
            rm -f weglot.csv
          fi
          git add data/weglot.csv weglot.csv 2>/dev/null || true
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: sync weglot exclusions + regenerate sitemap ($TIMESTAMP)

          New exclusions: ${{ steps.sync.outputs.new_exclusions || 0 }}"
          git push
