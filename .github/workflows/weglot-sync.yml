# DISABLED 2026-04-22 — superseded by content-pipeline.yml. Re-enable by uncommenting the schedule block.
name: Weglot Exclusion Sync

on:
  # schedule:
  #   - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-exclusions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sync Weglot Exclusions
        id: sync
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          WEGLOT_API_KEY: ${{ secrets.WEGLOT_API_KEY }}
        run: python3 tools/weglot/sync_exclusions.py

      - name: Regenerate Sitemap
        if: steps.sync.outputs.changes_made == 'true'
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python3 tools/generate_master_sitemap.py

      - name: Set up Node.js 20 (for llms.txt regeneration)
        if: steps.sync.outputs.changes_made == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Regenerate llms.txt from updated sitemap
        if: steps.sync.outputs.changes_made == 'true'
        run: |
          # Use local sitemap.xml (just generated above) so llms.txt is always in sync.
          python3 -m http.server 8081 --bind 127.0.0.1 &
          HTTP_PID=$!
          # Ensure the server is killed even if generate_llms.sh exits non-zero
          # (bash -e would abort the step before the explicit kill below).
          trap 'kill "$HTTP_PID" 2>/dev/null || true' EXIT
          sleep 2
          LLMS_SITEMAP_URL=http://localhost:8081/sitemap.xml bash tools/generate_llms.sh
          kill "$HTTP_PID" 2>/dev/null || true

      - name: Stage data changes
        if: steps.sync.outputs.changes_made == 'true'
        run: |
          git add data/weglot-exclusions.json data/weglot-sitemap-exclusions.json sitemap.xml llms.txt
          # Sync CSV: copy to root if exists, delete root if data CSV was cleared
          if [ -f data/weglot.csv ]; then
            cp data/weglot.csv weglot.csv
          else
            rm -f weglot.csv
          fi
          git add data/weglot.csv weglot.csv 2>/dev/null || true

      - name: Update log.txt (always)
        run: |
          export CHANGED="$(git diff --cached --name-only 2>/dev/null | tr '\n' ' ')"
          python3 tools/update_log.py
          git add log.txt

      - name: Commit & Push
        run: |
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git commit -m "chore: sync weglot exclusions ($TIMESTAMP)

          New exclusions: ${{ steps.sync.outputs.new_exclusions || 0 }}"
          git pull --rebase --autostash origin main
          git push
