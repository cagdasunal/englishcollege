name: Update Sitemap & LLMs.txt

on:
  schedule:
    # Every 6 hours at 00:00, 06:00, 12:00, and 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # Manual trigger via GitHub UI

concurrency:
  group: push-to-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # node-version is intentionally 20 — this is the Node runtime for
      # the `llmstxt` npm package invoked by tools/generate_llms.sh, NOT
      # the deprecated GitHub Actions action runtime. The action itself
      # (actions/setup-node@v5) is Node.js 24 native. Do not bump to 22/24
      # without testing `npx llmstxt` compatibility first.
      - name: Set up Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate sitemap.xml
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
        run: python tools/generate_master_sitemap.py

      - name: Generate llms.txt
        run: bash tools/generate_llms.sh

      - name: Check sitemap URLs
        run: python tools/check_sitemap_urls.py --posts-only
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml llms.txt
          if ! git diff --cached --quiet; then
            export CHANGED="$(git diff --cached --name-only | tr '\n' ' ')"
            python3 tools/update_log.py
            git add log.txt
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "Auto-update sitemap.xml and llms.txt ($TIMESTAMP)"
            git pull --rebase origin main
            git push
          else
            echo "No changes detected, skipping commit."
          fi
