<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/img/favicon.png">
  <title>English College — Sign in</title>
  <link rel="stylesheet" href="/assets/css/dashboard.css">
</head>
<body>
  <div class="gate-root">
    <form class="gate-card" id="gate-form" autocomplete="off">
      <div class="brand-mark">
        <div class="brand-logo" aria-label="English College">
          <img class="brand-logo-img" src="/assets/img/cel-logo-multicolor.svg" alt="English College">
        </div>
      </div>
      <h1>Internal dashboard</h1>
      <p class="gate-hint">Enter the shared password to continue.</p>
      <input type="password" id="gate-pw" placeholder="Password" autocomplete="off" autofocus required>
      <button type="submit">Unlock</button>
      <div class="gate-error" id="gate-err" role="alert" aria-live="polite"></div>
      <noscript><p class="gate-hint">JavaScript is required.</p></noscript>
    </form>
  </div>
  <script>
  (function () {
    const HASH = "e8ff7132aa00ae3886b10e2608498d040462fefe392df4aebfc6ffef024236be";
    const form = document.getElementById('gate-form');
    const input = document.getElementById('gate-pw');
    const errEl = document.getElementById('gate-err');
    function toHex(buf) {
      return Array.from(new Uint8Array(buf)).map(function (b) {
        return b.toString(16).padStart(2, '0');
      }).join('');
    }
    function getReturn() {
      const m = location.search.match(/[?&]return=([^&]+)/);
      if (m) {
        try {
          const dec = decodeURIComponent(m[1]);
          if (dec.indexOf('/') === 0 && dec.indexOf('//') !== 0) return dec;
        } catch (_) {}
      }
      return '/private/';
    }
    form.addEventListener('submit', function (ev) {
      ev.preventDefault();
      errEl.textContent = '';
      const pw = input.value;
      if (!pw) return;
      crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw)).then(function (buf) {
        if (toHex(buf) === HASH) {
          try { sessionStorage.setItem('cel_unlocked', String(Date.now())); } catch (_) {}
          location.replace(getReturn());
        } else {
          errEl.textContent = 'Wrong password.';
          input.value = '';
          input.focus();
        }
      }).catch(function () {
        errEl.textContent = 'Browser does not support required crypto APIs.';
      });
    });
  })();
  </script>
</body>
</html>
