  <script>
  (function () {
    var DATA = JSON.parse(document.getElementById('fidelo-data').textContent);
    var viewEl = document.getElementById('view');
    var courseEl = document.getElementById('course');
    var langEl = document.getElementById('language');
    var reportEl = document.getElementById('report');
    function langLabel(code) { var ll = DATA.locale_labels || {}; return ll[code] || code; }

    function esc(s) {
      if (s === null || s === undefined) return '';
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
    function escAttr(s) { return esc(s); }
    function isFalsy(v) { return v === null || v === undefined || v === '' || (Array.isArray(v) && v.length === 0); }
    function dash() { return '<span class="dash">&mdash;</span>'; }
    function renderVal(v) {
      if (isFalsy(v)) return dash();
      if (typeof v === 'boolean') return v ? '&#10003;' : dash();
      return esc(v);
    }
    function renderStatus(s) {
      if (s === 'ok') return '<span class="status-ok">ok</span>';
      if (s === 'partial') return '<span class="status-partial">partial</span>';
      if (s === 'failed') return '<span class="status-failed">failed</span>';
      return esc(s || '');
    }
    function truncHash(h) {
      if (!h) return dash();
      return '<span class="mono">' + esc(String(h).slice(0, 12)) + '&hellip;</span>';
    }
    function kvTableRaw(rows) {
      var html = '<table class="kv-table"><tbody>';
      rows.forEach(function (r) {
        var cell = r[2] === 'raw' ? (r[1] || dash()) : renderVal(r[1]);
        html += '<tr><th>' + esc(r[0]) + '</th><td>' + cell + '</td></tr>';
      });
      return html + '</tbody></table>';
    }
    function bullets(arr) {
      if (!arr || arr.length === 0) return dash();
      return '<ul class="bullets">' + arr.map(function (x) { return '<li>' + esc(x) + '</li>'; }).join('') + '</ul>';
    }
    function heroImg(url, cls) {
      if (!url) return dash();
      return '<img class="' + cls + '" src="' + escAttr(url) + '" alt="" loading="lazy">';
    }
    function techDetails(rows) {
      return '<details class="tech-details"><summary>Technical details</summary>'
           + '<div class="tech-body">' + kvTableRaw(rows) + '</div></details>';
    }

    function renderCourse(slug, locale) {
      var bySlug = DATA.course_data[slug] || {};
      var d = bySlug[locale];
      if (!d) {
        reportEl.innerHTML = '<p class="missing">No data for slug=<b>' + esc(slug) + '</b>, locale=<b>' + esc(locale) + '</b>.</p>';
        return;
      }
      var f = d.fields || {};
      var out = '';
      out += '<h2>Overview</h2>';
      out += kvTableRaw([
        ['Name', d.name],
        ['Slug', d.slug],
        ['Locale', langLabel(d.locale)],
        ['Order', d.order],
        ['Draft', d.draft],
        ['Archived', d.archived]
      ]);
      out += '<h2>Fidelo Fields</h2>';
      var introHtml = f.fidelo_intro_richtext ? '<div class="rt">' + f.fidelo_intro_richtext + '</div>' : dash();
      out += kvTableRaw([
        ['Fidelo Title', f.fidelo_title],
        ['Fidelo Intro (RichText)', introHtml, 'raw'],
        ['Fidelo Hero Image', heroImg(f.fidelo_hero_image_url, 'hero-img'), 'raw'],
        ['Starting Price (display)', f.fidelo_starting_price_display],
        ['Starting Price (amount)', f.fidelo_starting_price_amount],
        ['Starting Price (currency)', f.fidelo_starting_price_currency]
      ]);
      out += '<h2>Main Facts</h2>';
      out += bullets(f.fidelo_main_facts || []);
      out += '<h2>Intensity Rows</h2>';
      var rows = f.fidelo_intensity_rows || [];
      if (!rows.length) {
        out += '<p>' + dash() + ' (no rows)</p>';
      } else {
        out += '<div class="scroll-x"><table><thead><tr><th>Country</th><th>Fidelo ID</th><th>Code</th><th>Name</th><th>Lessons/week</th><th>Duration (min)</th><th>Visa Type</th><th>Price/week</th><th>Currency</th></tr></thead><tbody>';
        rows.forEach(function (r) {
          out += '<tr>'
            + '<td>' + renderVal(r.country) + '</td>'
            + '<td class="mono is-vmid">' + renderVal(r.fidelo_id) + '</td>'
            + '<td>' + renderVal(r.code) + '</td>'
            + '<td>' + renderVal(r.name) + '</td>'
            + '<td>' + renderVal(r.lessons_per_week) + '</td>'
            + '<td>' + renderVal(r.duration_minutes) + '</td>'
            + '<td>' + renderVal(r.visa_type) + '</td>'
            + '<td>' + renderVal(r.price_per_week_amount) + '</td>'
            + '<td>' + renderVal(r.price_per_week_currency) + '</td>'
            + '</tr>';
        });
        out += '</tbody></table></div>';
      }
      out += techDetails([
        ['Webflow Item ID', '<span class="mono">' + esc(d.webflow_item_id || '') + '</span>', 'raw'],
        ['Webflow Collection ID', '<span class="mono">' + esc(d.webflow_collection_id || '') + '</span>', 'raw'],
        ['Webflow Locale ID (EN)', '<span class="mono">' + esc(d.webflow_locale_id_en || '') + '</span>', 'raw'],
        ['Fidelo Key', '<span class="mono">' + esc(d.fidelo_key || '') + '</span>', 'raw'],
        ['Fetched At', d.fetched_at],
        ['Parse Status', renderStatus(d.parse_status), 'raw'],
        ['Parse Errors', (d.parse_errors && d.parse_errors.length) ? esc(d.parse_errors.join(', ')) : dash(), 'raw'],
        ['Raw HTML SHA-256', truncHash(d.raw_html_sha256), 'raw']
      ]);
      reportEl.innerHTML = out;
    }

    function renderList(locale) {
      var d = DATA.list_data[locale];
      if (!d) {
        reportEl.innerHTML = '<p class="missing">No course-list data for locale=<b>' + esc(locale) + '</b>.</p>';
        return;
      }
      var out = '';
      out += '<h2>Courses</h2>';
      var cs = d.courses || [];
      if (!cs.length) {
        out += '<p>' + dash() + ' (no courses)</p>';
      } else {
        out += '<div class="scroll-x"><table><thead><tr><th>#</th><th>Most Popular</th><th>Title</th><th>Slug</th><th>Href</th><th>Age Badge</th><th>Hero Image</th><th>Bullets</th></tr></thead><tbody>';
        cs.forEach(function (c) {
          out += '<tr>'
            + '<td>' + renderVal(c.position) + '</td>'
            + '<td>' + renderVal(c.most_popular) + '</td>'
            + '<td>' + renderVal(c.title) + '</td>'
            + '<td class="mono">' + renderVal(c.slug) + '</td>'
            + '<td class="mono">' + renderVal(c.href) + '</td>'
            + '<td>' + renderVal(c.age_badge) + '</td>'
            + '<td>' + heroImg(c.hero_image_url, 'hero-sm') + '</td>'
            + '<td>' + bullets(c.bullets || []) + '</td>'
            + '</tr>';
        });
        out += '</tbody></table></div>';
      }
      out += techDetails([
        ['Locale', langLabel(d.locale)],
        ['Fidelo List Key', '<span class="mono">' + esc(d.fidelo_list_key || '') + '</span>', 'raw'],
        ['Fetched At', d.fetched_at],
        ['Parse Status', renderStatus(d.parse_status), 'raw'],
        ['Parse Errors', (d.parse_errors && d.parse_errors.length) ? esc(d.parse_errors.join(', ')) : dash(), 'raw'],
        ['Raw HTML SHA-256', truncHash(d.raw_html_sha256), 'raw'],
        ['Course Count', (d.courses || []).length]
      ]);
      reportEl.innerHTML = out;
    }

    function render() {
      var view = viewEl.value;
      courseEl.disabled = (view !== 'course');
      if (view === 'list') renderList(langEl.value);
      else renderCourse(courseEl.value, langEl.value);
    }

    viewEl.addEventListener('change', render);
    courseEl.addEventListener('change', render);
    langEl.addEventListener('change', render);
    render();
  })();
  </script>
</body>
</html>
