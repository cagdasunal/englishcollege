  const content   = document.getElementById('content');

  selCity.addEventListener('change', () => { refreshPropOptions(); render(); });
  selView.addEventListener('change', render);
  selProp.addEventListener('change', render);
  selLocale.addEventListener('change', render);

  function refreshPropOptions() {
    const city = selCity.value;
    const slugs = Object.keys((housing[city] || {}));
    selProp.innerHTML = '';
    slugs.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      const rec = (housing[city][s] || {});
      const firstLocale = Object.values(rec)[0] || {};
      opt.textContent = firstLocale.name || s;
      selProp.appendChild(opt);
    });
  }

  function badge(status) {
    const cls = status === 'ok' ? 'badge-ok' : status === 'partial' ? 'badge-partial' : 'badge-failed';
    return `<span class="${cls}">${status || '\u2014'}</span>`;
  }
  function missingOrValue(v) {
    if (v === null || v === undefined || v === '') return '<span class="missing">\u2014</span>';
    return String(v);
  }
  function kv(label, val) {
    return `<tr><td class="label-cell">${label}</td><td>${missingOrValue(val)}</td></tr>`;
  }
  function techBlock(rows) {
    return '<details class="tech-details"><summary>Technical details</summary>'
         + '<div class="tech-body"><table><tbody>' + rows.join('') + '</tbody></table></div></details>';
  }

  function renderPropertyDetail() {
    const city = selCity.value;
    const slug = selProp.value;
    const locale = selLocale.value;
    const rec = ((housing[city] || {})[slug] || {})[locale];
    if (!rec) { content.innerHTML = '<p class="missing">No data for this combination.</p>'; return; }

    const f = rec.fields || {};
    const csv = rec.csv || {};
    const heroUrl = csv.featured_image || (csv.gallery && csv.gallery[0]) || '';
    const heroHtml = heroUrl ? `<img src="${heroUrl}" class="hero-img" alt="${rec.name || ''}">` : '';
    const galleryHtml = (csv.gallery || []).map(u => `<img src="${u}" class="listing-thumb-img" alt="">`).join('');
    const uspFacts = (f.fidelo_usp_facts || []).map(ft =>
      `<tr><td class="label-cell">${ft.label}</td><td>${ft.value}</td></tr>`
    ).join('');
    const accordionHtml = (f.fidelo_accordion_sections || []).map(s =>
      `<div class="section-block"><h3>${s.heading}</h3><ul class="item-list">` +
      (s.items || []).map(i => `<li>${i}</li>`).join('') +
      `</ul></div>`
    ).join('');
    const cityLabel = keys.cities && keys.cities[city] ? keys.cities[city].label : city;
    const techRows = [
      kv('Fidelo key', rec.fidelo_key),
      kv('Parse status (top)', badge(rec.parse_status_top)),
      kv('Parse status (bottom)', badge(rec.parse_status_bottom)),
      (rec.parse_errors && rec.parse_errors.length) ? kv('Parse errors', rec.parse_errors.join(', ')) : '',
    ];

    content.innerHTML = `
      <h2>${rec.name || slug}</h2>
      ${heroHtml}
      <table><thead><tr><th colspan="2">Record</th></tr></thead><tbody>
        ${kv('City', cityLabel)}
        ${kv('Slug', rec.slug)}
        ${kv('Locale', langLabel(locale))}
      </tbody></table>
      ${uspFacts ? `<table><thead><tr><th colspan="2">Main facts (Fidelo top)</th></tr></thead><tbody>${uspFacts}</tbody></table>` : ''}
      ${f.fidelo_title ? `<table><thead><tr><th colspan="2">Fidelo detail</th></tr></thead><tbody>
        ${kv('Title', f.fidelo_title)}
        ${f.fidelo_factsheet_url ? kv('Factsheet', `<a href="${f.fidelo_factsheet_url}" target="_blank">Download</a>`) : ''}
      </tbody></table>` : ''}
      ${accordionHtml}
      <table><thead><tr><th colspan="2">CSV baseline</th></tr></thead><tbody>
        ${kv('SEO Title', csv.seo_title)}
        ${kv('SEO Description', csv.seo_description)}
        ${kv('Description text', csv.description_text ? csv.description_text.substring(0, 300) + (csv.description_text.length > 300 ? '\u2026' : '') : '')}
        ${kv('Vimeo ID', csv.vimeo_key)}
        ${kv('Master Fidelo key', csv.master_fidelo_key)}
        ${kv('Draft', csv.draft)}
        ${kv('Archived', csv.archived)}
      </tbody></table>
      ${galleryHtml ? `<h3>Gallery (${(csv.gallery||[]).length} images)</h3><div class="gallery-grid">${galleryHtml}</div>` : ''}
      ${techBlock(techRows)}
    `;
  }

  function renderCityListing() {
    const city = selCity.value;
    const locale = selLocale.value;
    const rec = ((listing[city] || {}))[locale];
    if (!rec) { content.innerHTML = '<p class="missing">No listing data for this combination.</p>'; return; }

    const props = rec.properties || [];
    const rows = props.map(p => `<li class="prop-list"><div style="display:flex;gap:8px;align-items:center">
      <span class="pos">${p.position}</span>
      ${p.hero_image_url ? `<img src="${p.hero_image_url}" class="listing-thumb-img" alt="">` : ''}
      <div>
        <div style="font-weight:600">${p.title || '\u2014'}</div>
        <div style="color:#8a7a6a;font-size:12px">${p.slug || ''} ${p.badge ? `\u00b7 <em>${p.badge}</em>` : ''}</div>
        ${p.price_display ? `<div style="color:#6a8a5a;font-size:12px">${p.price_display}</div>` : ''}
        ${(p.bullets||[]).length ? `<ul style="font-size:12px;padding-left:14px;margin-top:4px">${p.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>` : ''}
      </div>
    </div></li>`).join('');

    const cityLabel = keys.cities && keys.cities[city] ? keys.cities[city].label : city;
    const techRows = [kv('Parse status', badge(rec.parse_status))];

    content.innerHTML = `
      <h2>${cityLabel} \u2014 ${langLabel(locale)} listing (${props.length} properties)</h2>
      <ul class="prop-list">${rows}</ul>
      ${techBlock(techRows)}
    `;
  }

  function render() {
    const view = selView.value;
    selProp.disabled = (view === 'listing');
    if (view === 'listing') renderCityListing();
    else renderPropertyDetail();
  }

  refreshPropOptions();
  render();
})();

</script>
</body>
</html>
